name: secret_recorder
description: Secret audio and video recorder with encryption
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.8.3
  record: ^5.0.4
  camera: ^0.10.5+9
  just_audio: ^0.9.36
  video_player: ^2.8.1
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.3.0
  vibration: ^1.8.4
  intl: ^0.19.0
  uuid: ^4.2.1
  open_file: ^3.3.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/